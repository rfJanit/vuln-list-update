name: Update vuln-list repo
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    name: Update repo vuln-list
    # Upstream aquasec's `trivy-large-1` label is a self-hosted runner that
    # doesn't exist in your fork. This fork runs only the rapidfort target, so
    # a standard GitHub-hosted runner is sufficient.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VULN_LIST_DIR: "vuln-list"
    steps:
      - name: Check out code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod

      - name: Check out vuln-list-trivy-rf repo
        # Retargeted from aquasec's `vuln-list` data repo to your own data repo.
        # See RELEASE-GUIDE.md §1.3.1 for how to create it.
        # If the repo is PUBLIC, replace the `token:` line with `token: ${{ secrets.GITHUB_TOKEN }}`
        # and grant this workflow `permissions: contents: write` at the top level.
        # If PRIVATE, create a PAT with `repo` scope on vuln-list-trivy-rf and store
        # it as VULN_LIST_TRIVY_RF_TOKEN under Repo Settings → Secrets and variables → Actions.
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: ${{ github.repository_owner }}/vuln-list-trivy-rf
          token: ${{ secrets.VULN_LIST_TRIVY_RF_TOKEN }}
          path: ${{ env.VULN_LIST_DIR }}
          persist-credentials: true # update.sh runs git push

      - name: Setup github user email and name
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Compile vuln-list-update
        run: go build -o vuln-list-update .

      # Upstream aquasec's 20+ per-source steps deleted for the fork.
      # Reason: aquasec's `vuln-list` repo already covers those. The trivy-db
      # build workflow clones `aquasec/vuln-list` directly and overlays this
      # repo's rapidfort/ subtree on top — see RELEASE-GUIDE.md §1.5.
      - if: always()
        name: RapidFort Advisories
        run: ./scripts/update.sh rapidfort "RapidFort Advisories"

      - name: Microsoft Teams Notification
        uses: Skitionek/notify-microsoft-teams@e7a2493ac87dad8aa7a62f079f295e54ff511d88
        if: failure()
        with:
          webhook_url: ${{ secrets.TRIVY_MSTEAMS_WEBHOOK }}
          needs: ${{ toJson(needs) }}
          job: ${{ toJson(job) }}
          steps: ${{ toJson(steps) }}
